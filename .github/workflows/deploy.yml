name: Deploy React Portfolio

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload build
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # React/Vite
          # path: ./build  # React CRA

      - name: Deploy
        uses: actions/deploy-pages@v4